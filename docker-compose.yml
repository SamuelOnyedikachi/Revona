version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: revora_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: revora

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: revora_server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/revora
      JWT_SECRET: ${JWT_SECRET:-local_dev_secret_change_in_prod}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: revora_client
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      REACT_APP_SOCKET_URL: http://localhost:5000
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo_data:
